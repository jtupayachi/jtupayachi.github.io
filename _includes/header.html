
<div id="particles-js">
  <!-- Simple CSS drifting clouds (works in all browsers, no WebGL) -->
  <div class="clouds-layer" id="clouds-layer">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="cloud cloud-4"></div>
    <div class="cloud cloud-5"></div>
  </div>

  <!-- Foreground cartoon scene layered over the clouds -->
  <div class="scene-fg">
    <!-- Drifting Birds (day only) -->
    <div class="birds" id="birds">
      <div class="bird bird-1"><span></span><span></span></div>
      <div class="bird bird-2"><span></span><span></span></div>
      <div class="bird bird-3"><span></span><span></span></div>
    </div>

    <!-- Cartoon Landscape (layered SVG hills) -->
    <div class="landscape">
      <!-- Far mountains -->
      <svg class="layer layer-mountains" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,224 L160,160 L320,224 L480,128 L640,224 L800,144 L960,224 L1120,160 L1280,224 L1440,176 L1440,320 L0,320 Z"></path>
      </svg>
      <!-- Snow caps -->
      <svg class="layer layer-caps" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M480,128 L455,165 L470,158 L485,168 L500,158 L515,165 Z M800,144 L778,176 L792,170 L805,179 L818,170 L832,176 Z"></path>
      </svg>
      <!-- Mid hill -->
      <svg class="layer layer-hill-back" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,256 C240,192 480,288 720,240 C960,192 1200,272 1440,224 L1440,320 L0,320 Z"></path>
      </svg>
      <!-- Front hill -->
      <svg class="layer layer-hill-front" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,288 C200,240 420,320 660,288 C900,256 1140,320 1440,272 L1440,320 L0,320 Z"></path>
      </svg>
      <!-- Trees on front hill -->
      <div class="trees">
        <div class="tree tree-1"></div>
        <div class="tree tree-2"></div>
        <div class="tree tree-3"></div>
        <div class="tree tree-4"></div>
        <div class="tree tree-5"></div>
        <div class="tree tree-6"></div>
      </div>
    </div>

    <!-- Weather Effects Layer (rain / storm) -->
    <div class="weather-effects" id="weather-effects"></div>
  </div>

  <div class="weather-badge" id="weather-badge">
    <i class="fa fa-map-marker" style="opacity: 0.7; font-size: 0.9rem;"></i>
    <span style="opacity: 0.8; font-size: 0.7rem;">Knoxville</span>
    <span style="opacity: 0.5;">|</span>
    <i class="fa fa-sun-o" id="weather-icon"></i>
    <span id="weather-text">Loading...</span>
  </div>
  <div class="header">
    <div class="header-content">
      <h1 class="site-title">
        <span class="greeting">Hello, I'm</span>
        <span class="name">{{ site.username }}</span>
      </h1>

      <nav class="header-links">
        <a class="nav-link" href="#about" data-scroll>
          <span class="nav-text">About Me</span>
          <span class="nav-underline"></span>
        </a>
        <a class="nav-link" href="#resume" data-scroll>
          <span class="nav-text">Resume</span>
          <span class="nav-underline"></span>
        </a>
      </nav>

      <div class="header-icons">
        {% if site.google_scholar %}
        <a class="social-link" aria-label="Google Scholar Profile" href="https://scholar.google.com/citations?user={{ site.google_scholar }}" target="_blank">
          <i class="fa fa-google"></i>
          <span class="social-tooltip">Google Scholar</span>
        </a>
        {% endif %}

        {% if site.email %}
        <a class="social-link" aria-label="Send email" href="mailto:{{ site.email }}">
          <i class="fa fa-envelope"></i>
          <span class="social-tooltip">Email</span>
        </a>
        {% endif %}

        {% if site.linkedin_username %}
        <a class="social-link" aria-label="My LinkedIn" target="_blank" href="https://www.linkedin.com/in/{{ site.linkedin_username }}">
          <i class="fa fa-linkedin"></i>
          <span class="social-tooltip">LinkedIn</span>
        </a>
        {% endif %}

        {% if site.github_username %}
        <a class="social-link" aria-label="My GitHub" target="_blank" href="https://github.com/{{ site.github_username }}">
          <i class="fa fa-github"></i>
          <span class="social-tooltip">GitHub</span>
        </a>
        {% endif %}
      </div>
    </div>
  </div>

  <a class="down" href="#about" data-scroll><i class="icon fa fa-chevron-down" aria-hidden="true"></i></a>
</div>

<style>
/* ============================================
   SKY BACKGROUND (pure CSS, no WebGL)
   ============================================ */
#particles-js {
  position: relative;
  width: 100%;
  height: 100vh;
  height: 100dvh; /* Dynamic viewport height for mobile */
  min-height: 100vh;
  min-height: 100dvh;
  overflow: hidden;
  box-sizing: border-box;
  /* Time-of-day gradient sky */
  background: linear-gradient(180deg, #4aa6e0 0%, #74b9ff 45%, #add6f5 100%);
  transition: background 2s ease-in-out;
}

#particles-js.morning   { background: linear-gradient(180deg, #2a5298 0%, #74b9ff 45%, #fdcb6e 100%); }
#particles-js.afternoon { background: linear-gradient(180deg, #4aa6e0 0%, #74b9ff 45%, #add6f5 100%); }
#particles-js.evening   { background: linear-gradient(180deg, #2d3436 0%, #6c5ce7 35%, #fd79a8 70%, #fdcb6e 100%); }
#particles-js.night     { background: linear-gradient(180deg, #0c0c1e 0%, #1a1a3e 45%, #2d2d5a 100%); }

/* ---- Drifting CSS clouds ---- */
.clouds-layer {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.cloud {
  position: absolute;
  background: #fff;
  border-radius: 100px;
  opacity: 0.85;
  filter: blur(1px);
}

.cloud::before,
.cloud::after {
  content: '';
  position: absolute;
  background: #fff;
  border-radius: 50%;
}

.cloud-1 { width: 160px; height: 50px; top: 14%; left: -200px; animation: drift 60s linear infinite; }
.cloud-1::before { width: 100px; height: 80px; top: -40px; left: 20px; }
.cloud-1::after  { width: 120px; height: 100px; top: -50px; left: 80px; }

.cloud-2 { width: 120px; height: 40px; top: 28%; left: -200px; animation: drift 80s linear infinite; animation-delay: -20s; opacity: 0.7; }
.cloud-2::before { width: 80px; height: 60px; top: -30px; left: 15px; }
.cloud-2::after  { width: 90px; height: 70px; top: -35px; left: 60px; }

.cloud-3 { width: 140px; height: 45px; top: 8%; left: -200px; animation: drift 70s linear infinite; animation-delay: -45s; }
.cloud-3::before { width: 90px; height: 70px; top: -35px; left: 25px; }
.cloud-3::after  { width: 100px; height: 80px; top: -40px; left: 70px; }

.cloud-4 { width: 100px; height: 35px; top: 38%; left: -200px; animation: drift 90s linear infinite; animation-delay: -10s; opacity: 0.6; }
.cloud-4::before { width: 70px; height: 55px; top: -28px; left: 20px; }
.cloud-4::after  { width: 85px; height: 65px; top: -32px; left: 55px; }

.cloud-5 { width: 110px; height: 38px; top: 20%; left: -200px; animation: drift 75s linear infinite; animation-delay: -60s; opacity: 0.75; }
.cloud-5::before { width: 65px; height: 50px; top: -25px; left: 15px; }
.cloud-5::after  { width: 75px; height: 60px; top: -30px; left: 50px; }

@keyframes drift {
  0%   { transform: translateX(0); }
  100% { transform: translateX(calc(100vw + 400px)); }
}

/* Dim clouds at night, warm them at sunset */
.night .cloud   { opacity: 0.25; background: #3a3a5e; }
.night .cloud::before, .night .cloud::after { background: #3a3a5e; }
.evening .cloud { background: #f3d3e0; }
.evening .cloud::before, .evening .cloud::after { background: #f3d3e0; }

/* ============================================
   FOREGROUND CARTOON SCENE (over the clouds)
   ============================================ */
.scene-fg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

/* ---- Landscape (mountains, hills) ---- */
.landscape {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 48%;
  pointer-events: none;
}

.landscape .layer {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: block;
}

.landscape .layer path { transition: fill 2s ease-in-out; }

.layer-mountains  { height: 100%; }
.layer-caps       { height: 100%; }
.layer-hill-back  { height: 72%; animation: hillSwayA 16s ease-in-out infinite; }
.layer-hill-front { height: 50%; animation: hillSwayB 12s ease-in-out infinite; }

@keyframes hillSwayA {
  0%, 100% { transform: translateX(0); }
  50%      { transform: translateX(-1.2%); }
}
@keyframes hillSwayB {
  0%, 100% { transform: translateX(0); }
  50%      { transform: translateX(1.2%); }
}

/* Snow caps default hidden, shown on snowy/night */
.layer-caps path { fill: #ffffff; opacity: 0; transition: opacity 1.2s ease; }
.weather-snowy .layer-caps path,
.night .layer-caps path { opacity: 0.85; }

/* Time-of-day palettes */
.morning .layer-mountains path  { fill: #5b6b8c; }
.morning .layer-hill-back path  { fill: #6a8caf; }
.morning .layer-hill-front path { fill: #3f5d78; }

.afternoon .layer-mountains path  { fill: #6c8fc7; }
.afternoon .layer-hill-back path  { fill: #4f7bb0; }
.afternoon .layer-hill-front path { fill: #2f5d8a; }

.evening .layer-mountains path  { fill: #4a3f63; }
.evening .layer-hill-back path  { fill: #3a3052; }
.evening .layer-hill-front path { fill: #241d38; }

.night .layer-mountains path  { fill: #1a1a30; }
.night .layer-hill-back path  { fill: #12122a; }
.night .layer-hill-front path { fill: #08081a; }

/* Fallback fill if no time class yet */
.layer-mountains path  { fill: #4a5568; }
.layer-hill-back path  { fill: #3a4a63; }
.layer-hill-front path { fill: #243049; }

/* ---- Pine trees ---- */
.trees {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 22%;
  z-index: 2;
}

.tree {
  position: absolute;
  bottom: 6%;
  width: 38px;
  height: 64px;
  transform-origin: bottom center;
  animation: treeSway 5s ease-in-out infinite;
}

.tree::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 7px;
  height: 14px;
  background: #3a2a1a;
  border-radius: 2px;
}

.tree::before {
  content: '';
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 19px solid transparent;
  border-right: 19px solid transparent;
  border-bottom: 52px solid #1f6b3a;
  filter: drop-shadow(0 -10px 0 #25804a) drop-shadow(0 -20px 0 #2f9a59);
}

.tree-1 { left: 6%;  transform: scale(0.9);  animation-delay: 0s; }
.tree-2 { left: 14%; transform: scale(0.7);  animation-delay: 0.6s; }
.tree-3 { left: 22%; transform: scale(1.05); animation-delay: 1.1s; }
.tree-4 { left: 72%; transform: scale(0.8);  animation-delay: 0.3s; }
.tree-5 { left: 83%; transform: scale(1.1);  animation-delay: 0.9s; }
.tree-6 { left: 92%; transform: scale(0.75); animation-delay: 1.4s; }

@keyframes treeSway {
  0%, 100% { transform: rotate(-1.5deg); }
  50%      { transform: rotate(1.5deg); }
}

.evening .tree::before { filter: drop-shadow(0 -10px 0 #1c5e38) drop-shadow(0 -20px 0 #226f43); border-bottom-color: #154d2a; }
.night .tree::before   { filter: drop-shadow(0 -10px 0 #0c2e1c) drop-shadow(0 -20px 0 #103c25); border-bottom-color: #0a2417; }
.night .tree::after, .evening .tree::after { background: #20160d; }

/* ---- Birds (day only) ---- */
.birds {
  position: absolute;
  top: 18%;
  left: 0;
  width: 100%;
  height: 40%;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1.5s ease;
  z-index: 1;
}

.morning .birds, .afternoon .birds { opacity: 1; }

.bird {
  position: absolute;
  width: 26px;
  height: 12px;
}

.bird span {
  position: absolute;
  top: 0;
  width: 14px;
  height: 12px;
  border: 2.5px solid rgba(40, 40, 60, 0.55);
  border-bottom: none;
  border-right: none;
  border-radius: 50% 50% 0 0;
  transform-origin: bottom right;
  animation: flap 0.5s ease-in-out infinite;
}

.bird span:nth-child(1) { left: 0; }
.bird span:nth-child(2) { left: 11px; transform: scaleX(-1); transform-origin: bottom left; }

@keyframes flap {
  0%, 100% { transform: rotate(0deg) scaleY(1); }
  50%      { transform: rotate(0deg) scaleY(0.55); }
}

.bird-1 { top: 12%; left: -40px; transform: scale(1);   animation: birdFly 22s linear infinite; }
.bird-2 { top: 26%; left: -40px; transform: scale(0.7); animation: birdFly 28s linear infinite; animation-delay: -8s; }
.bird-3 { top: 8%;  left: -40px; transform: scale(0.85);animation: birdFly 25s linear infinite; animation-delay: -15s; }

@keyframes birdFly {
  0%   { transform: translate(0, 0) scale(1); }
  50%  { transform: translate(50vw, -20px) scale(1); }
  100% { transform: translate(105vw, 10px) scale(1); }
}

/* ---- Weather effects (rain / storm) ---- */
.weather-effects {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
}

.weather-rainy .weather-effects::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(transparent 0%, rgba(120, 160, 200, 0.3) 50%, transparent 100%);
  background-size: 2px 20px;
  animation: rain 0.3s linear infinite;
}

@keyframes rain {
  0% { background-position: 0 0; }
  100% { background-position: 20px 40px; }
}

.weather-stormy .weather-effects::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(transparent 0%, rgba(80, 100, 130, 0.4) 50%, transparent 100%);
  background-size: 3px 30px;
  animation: stormRain 0.2s linear infinite;
}

.weather-stormy .weather-effects::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255, 255, 255, 0);
  animation: lightning 6s ease-in-out infinite;
}

@keyframes stormRain {
  0% { background-position: 0 0; transform: skewX(-10deg); }
  100% { background-position: 30px 60px; transform: skewX(-10deg); }
}

@keyframes lightning {
  0%, 89%, 91%, 93%, 95%, 100% { background: rgba(255, 255, 255, 0); }
  90% { background: rgba(255, 255, 255, 0.3); }
  92% { background: rgba(255, 255, 255, 0.1); }
  94% { background: rgba(255, 255, 255, 0.4); }
}

/* ============================================
   WEATHER BADGE
   ============================================ */
.weather-badge {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  padding: 10px 18px;
  border-radius: 25px;
  color: rgba(255,255,255,0.95);
  font-size: 0.8rem;
  font-family: 'Montserrat', sans-serif;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 10;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
}

.weather-badge i {
  font-size: 1.1rem;
}

/* ============================================
   HEADER CONTENT
   ============================================ */
.header {
  font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  z-index: 5;
  text-align: center;
  color: #fff;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  max-width: 800px;
}

.header-content {
  animation: fadeInUp 1s ease-out;
  display: inline-block;
  padding: 30px 45px;
  border-radius: 28px;
  background: rgba(20, 28, 45, 0.32);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.site-title {
  margin: 0;
  padding: 0;
  text-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.site-title .greeting {
  display: block;
  font-size: 1.2rem;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.8);
  margin-bottom: 10px;
}

.site-title .name {
  display: block;
  font-size: clamp(2.5rem, 8vw, 5rem);
  font-weight: 700;
  color: #fff;
  line-height: 1.1;
  text-shadow: 0 4px 30px rgba(0,0,0,0.4);
}

/* Navigation Links */
.header-links {
  display: flex;
  gap: 40px;
  align-items: center;
  justify-content: center;
  margin: 30px 0;
}

.nav-link {
  position: relative;
  text-decoration: none;
  color: #fff;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 1px;
  padding: 10px 0;
  transition: color 0.3s ease;
  text-shadow: 0 2px 6px rgba(0,0,0,0.6), 0 0 2px rgba(0,0,0,0.5);
}

.nav-link:hover { color: #fff; }

.nav-underline {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 2px;
  background: #fff;
  transition: width 0.3s ease;
  box-shadow: 0 0 10px rgba(255,255,255,0.5);
}

.nav-link:hover .nav-underline { width: 100%; }

/* Social Icons */
.header-icons {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin-top: 40px;
}

.social-link {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 50px;
  height: 50px;
  border: 2px solid rgba(255, 255, 255, 0.85);
  border-radius: 50%;
  color: #fff;
  font-size: 1.2rem;
  text-decoration: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(5px);
  background: rgba(20, 28, 45, 0.45);
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

.social-link:hover {
  border-color: #fff;
  background: rgba(20, 28, 45, 0.7);
  transform: translateY(-5px);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
}

.social-link i { transition: transform 0.3s ease; }
.social-link:hover i { transform: scale(1.1); }

.social-tooltip {
  position: absolute;
  bottom: -35px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.8);
  color: #fff;
  padding: 5px 12px;
  border-radius: 5px;
  font-size: 0.75rem;
  white-space: nowrap;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}

.social-link:hover .social-tooltip {
  opacity: 1;
  visibility: visible;
  bottom: -40px;
}

/* Scroll Down Indicator */
.down {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255, 255, 255, 0.8);
  font-size: 1.5rem;
  cursor: pointer;
  animation: bounce 2s infinite;
  transition: color 0.3s ease;
  text-decoration: none;
  border: none !important;
  z-index: 5;
}

.down:hover { color: #fff; }

@keyframes bounce {
  0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
  40% { transform: translateX(-50%) translateY(-10px); }
  60% { transform: translateX(-50%) translateY(-5px); }
}

/* Responsive */
@media (max-width: 768px) {
  .header-links { gap: 25px; }
  .nav-link { font-size: 0.9rem; }
  .social-link { width: 45px; height: 45px; font-size: 1rem; }
  .header-icons { gap: 15px; }
  .weather-badge { top: 15px; right: 15px; padding: 8px 14px; font-size: 0.75rem; }
}

@media (max-width: 480px) {
  .site-title .greeting { font-size: 1rem; }
  .header-links { flex-direction: column; gap: 15px; }
}
</style>

<script>
// Time-of-day sky + live Knoxville weather badge (pure CSS background, no WebGL)
(function () {
  var particlesEl = document.getElementById('particles-js');
  var weatherIcon = document.getElementById('weather-icon');
  var weatherText = document.getElementById('weather-text');

  // Knoxville, TN coordinates
  var LAT = 35.9606;
  var LON = -83.9207;

  var currentWeather = { name: 'clear', icon: 'fa-sun-o', label: 'Clear' };

  function getTimePeriod() {
    var hour = new Date().getHours();
    if (hour >= 5 && hour < 12) return 'morning';
    if (hour >= 12 && hour < 17) return 'afternoon';
    if (hour >= 17 && hour < 21) return 'evening';
    return 'night';
  }

  // Drive the sky + scene (landscape, birds, weather effects) via classes
  function applyClasses(period, weatherName) {
    if (!particlesEl) { return; }
    particlesEl.classList.remove('morning', 'afternoon', 'evening', 'night');
    particlesEl.classList.remove('weather-clear', 'weather-cloudy', 'weather-rainy', 'weather-snowy', 'weather-stormy');
    particlesEl.classList.add(period);
    particlesEl.classList.add('weather-' + weatherName);
  }

  // WMO Weather Codes -> simple weather type (https://open-meteo.com/en/docs)
  function mapWeatherCode(code) {
    if (code === 0 || code === 1) { return { name: 'clear', icon: 'fa-sun-o', label: 'Clear' }; }
    if (code === 2) { return { name: 'cloudy', icon: 'fa-cloud', label: 'Partly Cloudy' }; }
    if (code === 3 || code === 45 || code === 48) { return { name: 'cloudy', icon: 'fa-cloud', label: 'Cloudy' }; }
    if (code >= 51 && code <= 57) { return { name: 'rainy', icon: 'fa-tint', label: 'Drizzle' }; }
    if (code >= 61 && code <= 67) { return { name: 'rainy', icon: 'fa-tint', label: 'Rainy' }; }
    if (code >= 71 && code <= 77) { return { name: 'snowy', icon: 'fa-snowflake-o', label: 'Snowy' }; }
    if (code >= 80 && code <= 82) { return { name: 'rainy', icon: 'fa-tint', label: 'Showers' }; }
    if (code >= 85 && code <= 86) { return { name: 'snowy', icon: 'fa-snowflake-o', label: 'Snow Showers' }; }
    if (code >= 95 && code <= 99) { return { name: 'stormy', icon: 'fa-bolt', label: 'Thunderstorm' }; }
    return { name: 'clear', icon: 'fa-sun-o', label: 'Clear' };
  }

  function updateBadge(weather, temperature, period) {
    var icon = weather.icon;
    if (period === 'night' && weather.name === 'clear') { icon = 'fa-moon-o'; }
    if (weatherIcon) { weatherIcon.className = 'fa ' + icon; }
    if (weatherText) {
      if (temperature !== null && temperature !== undefined) {
        weatherText.textContent = Math.round(temperature) + '\u00B0F \u2022 ' + weather.label;
      } else {
        var label = period.charAt(0).toUpperCase() + period.slice(1);
        weatherText.textContent = label + ' \u2022 ' + weather.label;
      }
    }
  }

  async function fetchWeather() {
    try {
      var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + LAT +
        '&longitude=' + LON +
        '&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=America%2FNew_York';
      var response = await fetch(url);
      if (!response.ok) { throw new Error('Weather fetch failed'); }
      var data = await response.json();
      var weather = mapWeatherCode(data.current.weather_code);
      var temperature = data.current.temperature_2m;
      sessionStorage.setItem('knoxvilleWeather', JSON.stringify({
        weather: weather,
        temperature: temperature,
        timestamp: Date.now()
      }));
      return { weather: weather, temperature: temperature };
    } catch (error) {
      console.log('Weather API error, using cached or default:', error);
      return null;
    }
  }

  async function init() {
    var period = getTimePeriod();
    applyClasses(period, currentWeather.name);
    if (weatherText) { weatherText.textContent = 'Knoxville, TN...'; }

    var cached = sessionStorage.getItem('knoxvilleWeather');
    var fifteenMinutes = 15 * 60 * 1000;

    if (cached) {
      var c = JSON.parse(cached);
      if (Date.now() - c.timestamp < fifteenMinutes) {
        currentWeather = c.weather;
        updateBadge(c.weather, c.temperature, period);
        applyClasses(period, c.weather.name);
        return;
      }
    }

    var result = await fetchWeather();
    if (result) {
      currentWeather = result.weather;
      updateBadge(result.weather, result.temperature, period);
      applyClasses(period, result.weather.name);
    } else if (cached) {
      var cd = JSON.parse(cached);
      currentWeather = cd.weather;
      updateBadge(cd.weather, cd.temperature, period);
      applyClasses(period, cd.weather.name);
    } else {
      updateBadge(currentWeather, null, period);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // Keep the sky in sync with the time of day
  setInterval(function () {
    applyClasses(getTimePeriod(), currentWeather.name);
  }, 60000);

  // Refresh weather every 15 minutes
  setInterval(async function () {
    var period = getTimePeriod();
    var result = await fetchWeather();
    if (result) {
      currentWeather = result.weather;
      updateBadge(result.weather, result.temperature, period);
      applyClasses(period, result.weather.name);
    }
  }, 15 * 60 * 1000);
})();
</script>
